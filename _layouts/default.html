<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0e0e0e">

  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  {% feed_meta %}
</head>

<body>
  <header>
    <div class="component-nav">
      <div class="logo-header">
        <a href="{{ '/' | relative_url }}">
          {% if site.logo %}
            <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" />
          {% else %}
            <span class="site-title-text">{{ site.title }}</span>
          {% endif %}
        </a>

        <div class="hamburger" onclick="toggleMenu()">
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>

      <nav>
        <a href="{{ '/project/' | relative_url }}">Progetto</a>
        <a href="{{ '/team/' | relative_url }}">Team</a>
        <a href="{{ '/articles/' | relative_url }}">Blog</a>
        <a href="{{ '/contact/' | relative_url }}">Contatti</a>
      </nav>
    </div>
  </header>

  <div class="main-content">
    <div class="general-content-wrapper">
      {{ content }}
    </div>
  </div>

  <script>
    function toggleMenu() {
      const bars = document.querySelectorAll('.bar');
      bars.forEach(bar => bar.classList.toggle('active'));
      const nav = document.querySelector('.component-nav');
      nav.classList.toggle('open');
    }
  </script>
</body>
</html>
