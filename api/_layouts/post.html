---
layout: default
---

<article class="general-content-wrapper">
  <header class="post-header">
    <h1 id="{{ page.title | slugify }}">{{ page.title }}</h1>
    {% if page.subtitle %}
      <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    {% if page.date %}
      <p class="post-meta">{{ page.date | date: "%d/%m/%Y" }}</p>
    {% endif %}
  </header>

  {{ content }}
</article>
