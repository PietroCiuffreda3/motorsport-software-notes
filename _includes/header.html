<header class="ue-header">
  <div class="ue-header__inner">
    <a class="ue-brand" href="{{ '/' | relative_url }}">
      {% if site.logo %}
        <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}">
      {% else %}
        <span class="ue-brand__text">{{ site.title }}</span>
      {% endif %}
    </a>

    <nav class="ue-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/articles/' | relative_url }}">Blog</a>
    </nav>
  </div>
</header>
