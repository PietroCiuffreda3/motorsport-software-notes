<header>
  <div class="component-nav" id="siteNav">
    <div class="logo-header">
      <a href="{{ '/' | relative_url }}" class="nav-logo" aria-label="Home">
        <span class="nav-logo__text">{{ site.title }}</span>
      </a>

      <button class="hamburger" type="button" aria-label="Apri menu" aria-expanded="false" aria-controls="primaryNav" onclick="toggleMenu()">
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </div>

    <nav id="primaryNav" class="primary-nav" aria-label="Navigazione">
      <a href="{{ '/project/' | relative_url }}">Progetti</a>
      <a href="{{ '/articles/' | relative_url }}">Articoli</a>
      <a href="{{ '/idea/' | relative_url }}">Idea</a>
      <a href="{{ '/search/' | relative_url }}">Ricerca</a>
    </nav>
  </div>
</header>

<script>
  function toggleMenu(){
    const nav = document.getElementById('siteNav');
    const button = nav ? nav.querySelector('.hamburger') : null;
    const links = document.getElementById('primaryNav');
    if(!nav || !button || !links) return;
    nav.classList.toggle('open');
    const isOpen = nav.classList.contains('open');
    button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
  }
</script>
